name: Publish
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: read
jobs:
  publish_release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      checksums: ${{ steps.capture_checksums.outputs.checksums }}
    steps:
      - name: Checkout head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # TODO use later if we want multi-platform Docker builds
      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2.2.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Get release notes
        id: release_notes
        run: make release-notes > .release_notes
      - name: Run goreleaser-action
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean --release-notes=.release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture dist checksums in an output string
        id: capture_checksums
        run: |
          {
            echo "checksums<<EOF"
            cat dist/checksums.txt
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

  attest:
    name: Attest
    needs:
      - publish_release
    permissions:
      attestations: write # to persist
      id-token: write     # to sign
    uses: UpCloudLtd/workflows/.github/workflows/build-provenance.yaml@feat/provenance-file-output
    with:
      subject-checksums: ${{ needs.publish_release.outputs.checksums }}

  upload_sigstore_bundle:
    name: Upload Sigstore bundle
    runs-on: ubuntu-latest
    needs:
      - attest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.attest.outputs.bundle-artifact-id }}
      - run: gh release upload --repo "${{ github.repository }}" "${{ github.ref_name }}" "${{ needs.attest.outputs.bundle-artifact-filename }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
